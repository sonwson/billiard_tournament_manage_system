name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint and Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Cài đặt Node.js trực tiếp trên máy ảo của GitHub
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Trùng với phiên bản Node bạn dùng

      # 2. Cài đầy đủ thư viện (bao gồm cả devDependencies) và chạy Lint
      - name: Install Dependencies and Run Lint
        run: |
          npm ci
          npm run lint

      # 3. NẾU LINT THÀNH CÔNG, mới tiến hành build Docker image
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build -t backend-image .

      - name: Smoke Test Backend
        run: |
          docker run --rm backend-image node -e "require('./src/app'); console.log('APP_LOAD_OK')"

  frontend:
    name: Frontend Docker build and lint
    runs-on: ubuntu-latest
    # CHÚ Ý: Đặt thư mục làm việc mặc định cho toàn bộ job này là ./frontend
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        run: |
          docker build -t frontend-image .

      - name: Run Frontend Lint in Docker
        run: |
          docker run --rm frontend-image npm run lint

      - name: Build Frontend in Docker
        run: |
          docker run --rm frontend-image npm run build
        env:
          VITE_API_BASE_URL: https://example.onrender.com/api/v1