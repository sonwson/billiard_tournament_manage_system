name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint and Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Cài đặt Node.js trực tiếp trên máy ảo của GitHub
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Cài đầy đủ thư viện (bao gồm cả devDependencies) và chạy Lint
      - name: Install Dependencies and Run Lint
        run: |
          npm ci
          npm run lint

      # 3. NẾU LINT THÀNH CÔNG, mới tiến hành build Docker image
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build -t backend-image .

      # 4. Smoke Test Backend
      - name: Smoke Test Backend
        run: |
          docker run --rm backend-image node -e "require('./src/app'); console.log('APP_LOAD_OK')"

      # -------------------------------------------------------------
      # CÁC BƯỚC MỚI THÊM: ĐẨY IMAGE LÊN DOCKER HUB
      # -------------------------------------------------------------
      
      # 5. Đăng nhập Docker Hub bằng Secrets đã lưu
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Đổi tên image cho đúng chuẩn và Push lên mạng
      - name: Push Backend Image to Docker Hub
        run: |
          docker tag backend-image ${{ secrets.DOCKER_USERNAME }}/backend-image:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-image:latest

  frontend:
    name: Frontend Lint and Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Cài đặt Node.js trực tiếp trên máy ảo của GitHub
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Cài đầy đủ thư viện và chạy Lint ở ngoài Docker
      - name: Install Dependencies and Run Lint
        run: |
          npm ci
          npm run lint

      # 3. NẾU LINT THÀNH CÔNG, mới tiến hành build Docker image
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        run: |
          docker build -t frontend-image .
        env:
          VITE_API_BASE_URL: http://43.207.119.109:5000/api/v1

      # 4. Smoke Test cho Nginx
      - name: Smoke Test Frontend
        run: |
          docker run -d -p 8080:80 --name test-fe frontend-image
          sleep 2
          curl -f http://localhost:8080
          docker rm -f test-fe

      # -------------------------------------------------------------
      # CÁC BƯỚC MỚI THÊM: ĐẨY IMAGE LÊN DOCKER HUB
      # -------------------------------------------------------------
      
      # 5. Đăng nhập Docker Hub bằng Secrets đã lưu
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Đổi tên image cho đúng chuẩn và Push lên mạng
      - name: Push Frontend Image to Docker Hub
        run: |
          docker tag frontend-image ${{ secrets.DOCKER_USERNAME }}/frontend-image:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-image:latest