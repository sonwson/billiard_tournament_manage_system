name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Docker build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend Docker image
        run: |
          docker build -t backend-image .

      - name: Run Backend Lint in Docker
        run: |
          docker run --rm backend-image npm run lint

      - name: Smoke Test Backend
        run: |
          docker run --rm backend-image node -e "require('./src/app'); console.log('APP_LOAD_OK')"

  frontend:
    name: Frontend Docker build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build frontend Docker image
        run: |
          docker build -t frontend-image .

      - name: Run Frontend Lint in Docker
        run: |
          docker run --rm frontend-image npm run lint

      - name: Build Frontend in Docker
        run: |
          docker run --rm frontend-image npm run build
        env:
          VITE_API_BASE_URL: https://example.onrender.com/api/v1