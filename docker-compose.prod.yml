services:
  mongo:
    image: mongo:8
    container_name: billiardhub-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: billiardhub-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      NODE_ENV: production
      APP_NAME: Billiards Tournament API
      API_PREFIX: /api/v1
      CLIENT_URL: ${APP_PUBLIC_URL:-http://localhost}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/billiards_tournament}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      LOG_LEVEL: info
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@billiardhub.local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cuescore.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      ADMIN_NAME: ${ADMIN_NAME:-CueScore Admin}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: billiardhub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo_data:
